set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB:clipboard"

# プレフィックスキー: C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# セッション、ウィンドウ、ペインの番号を1から開始する
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ウィンドウ履歴の最大行数
set-option -g history-limit 5000

# コピーモード
set-window-option -g mode-keys vi
set -s set-clipboard on

# ==========================================
# キーコンフィグ
# ==========================================
# ペインの移動をvi風にする
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# ペインのリサイズをvi風にする
# bind -r C-h resize-pane -L 10
# bind -r C-l resize-pane -R 10
# bind -r C-j resize-pane -D 10
# bind -r C-k resize-pane -U 10

# ALT+hjklでペイン間を移動（左右端では隣のウィンドウへ移動）
bind -n M-Left run-shell 'cur="#{pane_id}"; tmux select-pane -L; [ "$cur" = "$(tmux display -p "##{pane_id}")" ] && tmux select-window -t :-; true'
bind -n M-Right run-shell 'cur="#{pane_id}"; tmux select-pane -R; [ "$cur" = "$(tmux display -p "##{pane_id}")" ] && tmux select-window -t :+; true'
bind -n M-h run-shell 'cur="#{pane_id}"; tmux select-pane -L; [ "$cur" = "$(tmux display -p "##{pane_id}")" ] && tmux select-window -t :-; true'
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l run-shell 'cur="#{pane_id}"; tmux select-pane -R; [ "$cur" = "$(tmux display -p "##{pane_id}")" ] && tmux select-window -t :+; true'

# ALT+i/oで現在のウィンドウを左右へ移動
bind -n M-i swap-window -d -t :-
bind -n M-o swap-window -d -t :+

# prefix + -で水平, prefix + \で垂直に分割
bind - split-window -v
bind | split-window -h
bind \\ split-window -h
bind c new-window -c "#{pane_current_path}"

# prefix + rでウィンドウをリネーム
bind r command-prompt "rename-window %%"

# マウス操作を有効化
set -g mouse on

# 微小なドラッグではコピーせず、通常の選択は保持したままコピーする
# 選択中のホイール操作でドラッグ終了イベントが混ざっても範囲選択を継続できる
bind -T copy-mode-vi MouseDragEnd1Pane if-shell -F '#{&&:#{==:#{selection_start_x},#{selection_end_x}},#{==:#{selection_start_y},#{selection_end_y}}}' 'send-keys -X cancel' 'send-keys -X copy-selection-no-clear'
bind -T copy-mode MouseDragEnd1Pane if-shell -F '#{&&:#{==:#{selection_start_x},#{selection_end_x}},#{==:#{selection_start_y},#{selection_end_y}}}' 'send-keys -X cancel' 'send-keys -X copy-selection-no-clear'

# コピー後にクリックすると選択表示とコピーモードを終了する
bind -T copy-mode-vi MouseDown1Pane if-shell -F '#{selection_present}' 'send-keys -X cancel' 'select-pane'
bind -T copy-mode MouseDown1Pane if-shell -F '#{selection_present}' 'send-keys -X cancel' 'select-pane'



# ==========================================
# 1. カラーパレットの定義（お好みの色を変数化）
# ==========================================
set -g @c_bg         "#1e1e2e"  # 通常時のバー背景
set -g @c_pfx_bg     "#afff00"  # C-a時のバー背景（Zellij黄緑）
set -g @c_session    "#11111b"  # セッション名の背景（黒）
set -g @c_session_fg "#cdd6f4"  # セッション名の文字
set -g @c_zellij     "#afff00"  # 通常時のアクティブタブ
set -g @c_tab_fg     "#9399b2"  # 通常タブの文字
set -g @c_tab_bg     "#313244"  # 通常タブの背景

# ==========================================
# 状態によって劇的に変化するZellij風ステータスバー（時計なし・ミニマル）
# ==========================================

# ステータスバーを画面上部に配置
set -g status-position top
set -g status-justify left
set -g status-right ""

# バー全体の背景色を動的に変更
set -g status-style "#{?client_prefix,bg=#{@c_pfx_bg},bg=#{@c_bg}}"

# 左端：セッション名（黒背景 + 右側を三角形に）
set -g status-left "#[fg=#{@c_session_fg} bg=#{@c_session} bold] #{?client_prefix,󱐌,❐} #S #[fg=#{@c_session} bg=default nobold] "
set -g status-left-length 30

# タブ（ウィンドウ）の表示
set -g window-status-format "#[fg=#{@c_tab_fg} bg=#{@c_tab_bg}] #I:#W "
set -g window-status-current-format "#{?client_prefix,#[fg=#{@c_pfx_bg} bg=#{@c_session} bold],#[fg=#{@c_session} bg=#{@c_zellij} bold]} #I:#W "
set -g window-status-separator " "

# ==========================================
# プラグイン設定
# ==========================================

# TPM（Tmux Plugin Manager）の初期化設定
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'

# tmux-sessionx
set -g @plugin 'omerxx/tmux-sessionx'
# Prefix + o でセッションマネージャーを起動（ZellijのCtrl+oに合わせるイメージ）
set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'

# sainnhe/tmux-fzf: Alt + x でVSCode風コマンドパレットを開く
# set -g @plugin 'sainnhe/tmux-fzf'
# bind -n M-x run-shell -b "$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/main.sh"

# TPMの起動（必ず最下部に記述）
run '~/.local/share/tmux/plugins/tpm/tpm'
